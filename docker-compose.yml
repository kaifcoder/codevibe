services:
  langgraph-redis:
    image: redis:6
    pull_policy: missing
    healthcheck:
      test: "redis-cli ping"
      interval: 5s
      timeout: 1s
      retries: 5

  langgraph-api:
    ports:
      - "2024:8000"
    depends_on:
      langgraph-redis:
        condition: service_healthy
    environment:
      REDIS_URI: "redis://langgraph-redis:6379"
      # Supabase pooler — the direct host (db.<ref>.supabase.co:5432) resolves
      # IPv6-only on the free tier and Docker doesn't have IPv6 routing, so we
      # use the IPv4 pooler. LangGraph needs **session** mode (port 5432 on
      # the pooler hostname) because its checkpointer relies on prepared
      # statements that transaction pooling drops. Value lives in .env.
      POSTGRES_URI: "${LANGGRAPH_POSTGRES_URI}"
      LANGSERVE_GRAPHS: '{"agent": "./src/lib/agent.ts:agent"}'
      DOCKER_CONTAINER: "true"
      YJS_WS_URL: "ws://host.docker.internal:1234"
      # Where the Next.js app lives, so the agent can call its internal MCP
      # credential routes. Must match what `INTERNAL_AGENT_SECRET` is set in.
      APP_URL: "${APP_URL:-http://host.docker.internal:3000}"
      INTERNAL_AGENT_SECRET: "${INTERNAL_AGENT_SECRET}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    pull_policy: missing
    build:
      context: .
      dockerfile: Dockerfile.agent
    healthcheck:
      test: "python /api/healthcheck.py"
      interval: 60s
      start_interval: 1s
      start_period: 10s
