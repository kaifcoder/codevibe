# Copy this file to 10-secrets.yaml, fill in real values, and `kubectl apply`.
# DO NOT check 10-secrets.yaml into git — it's added to .gitignore.
#
# Both Postgres-using workloads (Prisma + LangGraph) point at Supabase, but
# in *separate projects* — Prisma + LangGraph each run their own migrations
# and would collide if they shared a database. Free tier allows two projects.
#
# IMPORTANT — Supabase pooler vs. direct:
#   - db.<ref>.supabase.co:5432            → direct, IPv6-only (won't work
#                                            from AKS pods or Docker without
#                                            IPv6 routing)
#   - aws-X-<region>.pooler.supabase.com   → IPv4 pooler (Supavisor):
#       :5432  = SESSION pool (use this for LangGraph — preserves prepared
#                statements its checkpointer needs)
#       :6543  = TRANSACTION pool (use for Prisma runtime; faster for short
#                queries, but drops prepared statements)
#
# For Prisma migrations from your laptop, also set DIRECT_URL to the session
# pooler (port 5432) — `prisma migrate` needs session-level features.
#
# Pre-enable extensions in the LangGraph project (Database → Extensions):
#   btree_gin, btree_gist, pgcrypto, citext, ltree, pg_trgm
# Otherwise the agent's first boot fails on CREATE EXTENSION.
apiVersion: v1
kind: Secret
metadata:
  name: codevibe-app-secrets
  namespace: codevibe
type: Opaque
stringData:
  ANTHROPIC_API_KEY: "sk-ant-REPLACE_ME"
  E2B_API_KEY: "REPLACE_ME"
  LANGSMITH_API_KEY: ""
  LANGGRAPH_CLOUD_LICENSE_KEY: ""
  GITHUB_TOKEN: ""
---
# Prisma's app DB (Supabase project A).
# DATABASE_URL  → transaction pooler (6543), pgbouncer-friendly for runtime.
# DIRECT_URL    → session pooler (5432), used by `prisma migrate`.
apiVersion: v1
kind: Secret
metadata:
  name: codevibe-app-database
  namespace: codevibe
type: Opaque
stringData:
  DATABASE_URL: "postgresql://postgres.<APP_PROJECT_REF>:REPLACE_ME@aws-X-<region>.pooler.supabase.com:6543/postgres?pgbouncer=true&connection_limit=1"
  DIRECT_URL:   "postgresql://postgres.<APP_PROJECT_REF>:REPLACE_ME@aws-X-<region>.pooler.supabase.com:5432/postgres"
---
# LangGraph's checkpoint DB (Supabase project B).
# The Helm chart reads `connection_url` from this secret when
# postgres.external.existingSecretName is set in the values file.
# Must be the SESSION pooler (port 5432) — checkpointer uses prepared statements.
apiVersion: v1
kind: Secret
metadata:
  name: codevibe-langgraph-database
  namespace: codevibe
type: Opaque
stringData:
  connection_url: "postgresql://postgres.<LANGGRAPH_PROJECT_REF>:REPLACE_ME@aws-X-<region>.pooler.supabase.com:5432/postgres?sslmode=require"
